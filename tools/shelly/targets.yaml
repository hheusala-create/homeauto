profiles:
  smart_bulb_wall_switch:
    applies_to_control_model:
      - shelly_plus_smart_bulb
    shelly_settings:
      input_mode: switch
      relay_mode: detached
      power_on_default: on
      mqtt:
        enabled: true
        server: "10.107.1.101:1883"
        rpc_over_mqtt: true
        status_notifications: true
        generic_status_update: true

  relay_only_light:
    applies_to_control_model:
      - relay_only
    shelly_settings:
      mqtt:
        enabled: true
        server: "10.107.1.101:1883"
        rpc_over_mqtt: true
        status_notifications: true
        generic_status_update: true

  fixed_light_switch_as_x:
    applies_to_control_model:
      - relay_only
    notes:
      - fixed_light
      - user_facing_light_wrapper
      - keep_underlying_switch_entity

  critical_power:
    applies_to_control_model:
      - critical_power
    shelly_settings:
      mqtt:
        enabled: true
        server: "10.107.1.101:1883"
        rpc_over_mqtt: true
        status_notifications: true
        generic_status_update: true
    safeguards:
      exclude_from_bulk_off: true
      require_explicit_targeting: true

  smart_bulb_only:
    applies_to_control_model:
      - smart_bulb_only
    notes:
      - no_shelly
      - no_wall_switch
      - smart_bulb_control_only

