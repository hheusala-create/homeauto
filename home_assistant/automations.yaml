- id: "1775595766007"
  alias: Hobby room wall switch -> hobby room light
  description: Control Hobby room light from Shelly wall switch input state
  triggers:
    - topic: shelly1g4-ccba97c89350/status/input:0
      trigger: mqtt
  conditions: []
  actions:
    - choose:
        - conditions:
            - condition: template
              value_template: "{{ trigger.payload_json.state == true }}"
          sequence:
            - target:
                entity_id: light.hobby_room_light_ceiling
              action: light.turn_on
        - conditions:
            - condition: template
              value_template: "{{ trigger.payload_json.state == false }}"
          sequence:
            - target:
                entity_id: light.hobby_room_light_ceiling
              action: light.turn_off
  mode: restart
