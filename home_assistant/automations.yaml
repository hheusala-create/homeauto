- alias: "Hall: Sytytä valot kun saavutaan koodilla"
  description: "Kytkee eteisen valot päälle vain, jos lukko avataan näppäimistöllä hämärän aikaan."
  trigger:
    - platform: state
      entity_id: lock.front_door
      from: "locked"
      to: "unlocked"
  condition:
    - condition: and
      conditions:
        # 1. Aurinko-ehto (20 min ennen laskua tai sen jälkeen)
        - condition: or
          conditions:
            - condition: sun
              after: sunset
              after_offset: "-00:20:00"
            - condition: state
              entity_id: sun.sun
              state: "below_horizon"
        # 2. Saapumisen varmistus: Avattu koodilla
        - condition: template
          value_template: "{{ state_attr('lock.front_door', 'lock_status') == 'keypad_unlocked' }}"
  action:
    - service: light.turn_on
      target:
        entity_id: light.hall_light_ceiling
  mode: single
