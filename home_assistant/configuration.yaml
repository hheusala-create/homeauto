template:
  - sensor:
      - name: "Electricity previous rounded"
        unique_id: "sensor_electricity_previous_rounded"
        unit_of_measurement: "€"
        state: "{{ states('sensor.nord_pool_fi_previous_price') | float(0) | round(2) }}"

      - name: "Electricity current rounded"
        unique_id: "sensor_electricity_current_rounded"
        unit_of_measurement: "€"
        state: "{{ states('sensor.nord_pool_fi_current_price') | float(0) | round(2) }}"

      - name: "Electricity next rounded"
        unique_id: "sensor_electricity_next_rounded"
        unit_of_measurement: "€"
        state: "{{ states('sensor.nord_pool_fi_next_price') | float(0) | round(2) }}"

      - name: "Electricity lowest rounded"
        unique_id: "sensor_electricity_lowest_rounded"
        unit_of_measurement: "€"
        state: "{{ states('sensor.nord_pool_fi_lowest_price') | float(0) | round(2) }}"

      - name: "Electricity highest rounded"
        unique_id: "sensor_electricity_highest_rounded"
        unit_of_measurement: "€"
        state: "{{ states('sensor.nord_pool_fi_highest_price') | float(0) | round(2) }}"

      - name: "Electricity lowest time"
        unique_id: "sensor_electricity_lowest_time"
        state: "{{ as_datetime(state_attr('sensor.nord_pool_fi_lowest_price', 'start')).astimezone(now().tzinfo).strftime('%H:%M') if state_attr('sensor.nord_pool_fi_lowest_price', 'start') else '—' }}"

      - name: "Electricity highest time"
        unique_id: "sensor_electricity_highest_time"
        state: "{{ as_datetime(state_attr('sensor.nord_pool_fi_highest_price', 'start')).astimezone(now().tzinfo).strftime('%H:%M') if state_attr('sensor.nord_pool_fi_highest_price', 'start') else '—' }}"

  - sensor:
      - name: "Electricity price level"
        unique_id: "sensor_electricity_price_level"
        state: >
          {% set p = states('sensor.nord_pool_fi_current_price') | float(0) %}
          {% if p < 0.05 %}
            Halpaa
          {% elif p >= 0.16 %}
            Kallista
          {% else %}
            Normaali
          {% endif %}

wake_on_lan:
