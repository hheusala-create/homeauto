name: Sync repo to Google Drive

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sync-google-drive-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth

      - name: Write service account JSON
        run: |
          cat > "$RUNNER_TEMP/gdrive-service-account.json" <<'JSON'
          ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          JSON
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/gdrive-service-account.json" >> "$GITHUB_ENV"

      - name: Sync repository to Google Drive
        env:
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          python <<'PY'
          import mimetypes
          import os
          from pathlib import Path

          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload

          ROOT = Path(".").resolve()
          TARGET_FOLDER_ID = os.environ["GDRIVE_FOLDER_ID"]

          SCOPES = ["https://www.googleapis.com/auth/drive"]
          creds = service_account.Credentials.from_service_account_file(
              os.environ["GOOGLE_APPLICATION_CREDENTIALS"],
              scopes=SCOPES,
          )
          service = build("drive", "v3", credentials=creds)

          EXCLUDE_DIRS = {
              ".git",
              ".github",
              "__pycache__",
              ".pytest_cache",
              ".venv",
              "venv",
              "node_modules",
          }

          EXCLUDE_FILES = {
              ".DS_Store",
          }

          def list_children(folder_id):
              items = []
              page_token = None
              while True:
                  resp = service.files().list(
                      q=f"'{folder_id}' in parents and trashed = false",
                      fields="nextPageToken, files(id, name, mimeType)",
                      pageToken=page_token,
                  ).execute()
                  items.extend(resp.get("files", []))
                  page_token = resp.get("nextPageToken")
                  if not page_token:
                      break
              return items

          def delete_tree(folder_id):
              for item in list_children(folder_id):
                  if item["mimeType"] == "application/vnd.google-apps.folder":
                      delete_tree(item["id"])
                  service.files().delete(fileId=item["id"]).execute()

          def create_folder(name, parent_id):
              metadata = {
                  "name": name,
                  "mimeType": "application/vnd.google-apps.folder",
                  "parents": [parent_id],
              }
              folder = service.files().create(body=metadata, fields="id").execute()
              return folder["id"]

          def upload_file(path, parent_id):
              mime_type = mimetypes.guess_type(str(path))[0] or "application/octet-stream"
              metadata = {
                  "name": path.name,
                  "parents": [parent_id],
              }
              media = MediaFileUpload(str(path), mimetype=mime_type, resumable=False)
              service.files().create(body=metadata, media_body=media, fields="id").execute()

          def walk(local_dir, drive_parent_id):
              for entry in sorted(local_dir.iterdir(), key=lambda p: (p.is_file(), p.name.lower())):
                  if entry.name in EXCLUDE_DIRS or entry.name in EXCLUDE_FILES:
                      continue
                  if entry.is_dir():
                      subfolder_id = create_folder(entry.name, drive_parent_id)
                      walk(entry, subfolder_id)
                  elif entry.is_file():
                      upload_file(entry, drive_parent_id)

          delete_tree(TARGET_FOLDER_ID)
          walk(ROOT, TARGET_FOLDER_ID)
          print("Google Drive sync complete.")
          PY
